name: Deploy Pkgdown + Shinylive

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar o R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependências do pacote e ferramentas
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::shinylive, any::httpuv, local::.

      - name: 1. Construir o site do pacote (Pkgdown)
        # O pkgdown gera os arquivos do site dentro da pasta "docs"
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: 2. Construir o aplicativo Shiny (WebAssembly)
        # O Shinylive pega a pasta "app" e joga o resultado dentro da pasta "docs/calculadora"
        run: shinylive::export(appdir = "app", destdir = "docs/calculadora")
        shell: Rscript {0}

      - name: Fazer upload dos artefatos estáticos
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
